<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸名古屋✈️💖 (Firebase 進階編輯版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --jp-indigo: #3E517A; --jp-cream: #FAF7F0; --jp-charcoal: #333333; --jp-accent-red: #B74F41; --jp-bamboo: #7F9A65; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--jp-cream); color: var(--jp-charcoal); }
        h1, .serif-font { font-family: 'Noto Serif TC', serif; }
        .header-cell { background-color: var(--jp-indigo); color: white; padding: 16px 12px; position: sticky; top: 0; z-index: 10; }
        .tab-btn { padding: 16px 28px; font-weight: 600; cursor: pointer; transition: 0.3s; border-bottom: 4px solid transparent; }
        .active-tab { color: var(--jp-indigo); border-bottom: 4px solid var(--jp-indigo); }
        .expense-card { transition: all 0.3s ease; border: 2px solid transparent; }
        .expense-card:hover { border-color: var(--jp-indigo); transform: translateY(-2px); }
    </style>
</head>
<body class="p-2 sm:p-4">
    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border border-stone-200">
        <header class="p-8 bg-[var(--jp-indigo)] text-white flex justify-between items-center">
            <h1 class="text-3xl font-bold serif-font tracking-widest">🧸名古屋 ✈️💖</h1>
            <span id="syncStatus" class="bg-white/20 px-4 py-2 rounded-full text-red-200 font-bold text-sm">🔴 連線中...</span>
        </header>

        <div class="flex bg-stone-100 border-b overflow-x-auto">
            <div onclick="switchPage('itinerary')" id="tab-itinerary" class="tab-btn active-tab whitespace-nowrap">📅 行程規劃</div>
            <div onclick="switchPage('split')" id="tab-split" class="tab-btn whitespace-nowrap">💰 記帳與統計</div>
        </div>

        <div id="split-page" class="p-4 sm:p-8 hidden">
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-10">
                <div class="space-y-8">
                    <div class="bg-stone-50 p-6 rounded-2xl border border-stone-200 shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold serif-font text-[var(--jp-indigo)]">💸 新增支出</h2>
                            <button onclick="toggleManager()" class="text-sm bg-stone-200 px-3 py-1 rounded-lg hover:bg-stone-300 font-bold">⚙️ 管理成員</button>
                        </div>
                        
                        <div id="listManager" class="hidden p-4 bg-white border rounded-xl mb-6 shadow-inner">
                            <p class="font-bold border-b pb-1 mb-2 flex justify-between">付款人 <button onclick="addNewPayer()" class="text-blue-500 text-sm">+新增</button></p>
                            <div id="payerList" class="flex flex-wrap gap-2 py-1 mb-4"></div>
                            <p class="font-bold border-b pb-1 mb-2 flex justify-between">分帳成員 <button onclick="addNewMember()" class="text-blue-500 text-sm">+新增</button></p>
                            <div id="targetList" class="flex flex-wrap gap-2 py-1"></div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                            <input type="date" id="expDateInput" class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-200">
                            <input type="text" id="expName" placeholder="項目內容" class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-200">
                        </div>

                        <div class="grid grid-cols-3 gap-4 mb-4">
                            <select id="expCurrency" class="p-3 border rounded-xl bg-white font-bold">
                                <option value="JPY">日幣 ¥</option>
                                <option value="TWD">台幣 $</option>
                            </select>
                            <input type="number" id="expAmount" placeholder="金額" class="p-3 border rounded-xl col-span-2 outline-none focus:ring-2 focus:ring-indigo-200">
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <select id="expMethod" onchange="toggleCardField()" class="p-3 border rounded-xl bg-white">
                                <option value="CASH">💵 現金</option>
                                <option value="CARD">💳 刷卡</option>
                            </select>
                            <select id="expPayer" class="p-3 border rounded-xl bg-white font-bold"></select>
                        </div>

                        <div id="cardRewardSection" class="hidden space-y-4 mb-4 bg-blue-50 p-4 rounded-2xl border border-blue-100">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="expCardType" placeholder="哪張卡？" value="玉山熊本熊" class="p-2 border rounded-xl bg-white text-sm">
                                <div class="flex items-center bg-white border rounded-xl px-2">
                                    <input type="number" id="expRewardRate" value="3" step="0.1" class="w-full p-1 text-right outline-none">
                                    <span class="text-gray-400 text-sm ml-1">%回饋</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white p-4 rounded-2xl border border-stone-200 mb-6">
                            <p class="font-bold text-stone-500 text-sm mb-3">誰要分這筆錢？</p>
                            <div id="splitCheckboxes" class="flex flex-wrap gap-4"></div>
                        </div>

                        <button onclick="addExpense()" class="w-full bg-[var(--jp-bamboo)] hover:bg-green-700 text-white py-4 rounded-2xl text-xl font-bold shadow-lg transition-all active:scale-95">確認加入帳單</button>
                    </div>

                    <h3 class="text-xl font-bold serif-font text-stone-600">📑 歷史明細 (可直接在下方編輯)</h3>
                    <div id="expenseHistory" class="space-y-4 max-h-[800px] overflow-y-auto pr-2"></div>
                </div>

                <div class="space-y-8">
                    <div id="settlementReport" class="bg-white p-8 rounded-3xl border-4 border-[var(--jp-indigo)] shadow-2xl space-y-8 sticky top-4">
                        <div class="text-center pb-6 border-b-2">
                            <p class="text-stone-500 font-bold mb-2">🌍 總公費支出 (台幣計)</p>
                            <p class="text-6xl font-black text-[#3E517A]" id="ui-total-exp">$0</p>
                        </div>
                        <div id="individualStats" class="space-y-4"></div>
                        <button onclick="clearAllExpenses()" class="w-full text-red-400 text-xs hover:text-red-600 transition-colors">🗑️ 清空所有歷史帳單</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="itinerary-page" class="p-4 sm:p-8">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8">
                <button onclick="addRow()" class="bg-[var(--jp-indigo)] text-white px-8 py-3 rounded-2xl font-bold shadow-md hover:opacity-90 active:scale-95 transition-all w-full sm:w-auto">+ 新增景點</button>
                <div class="font-bold bg-white px-4 py-2 rounded-xl border">
                    目前匯率: 1 JPY = <input type="number" id="rateInput" step="0.0001" class="w-20 border-b border-indigo-400 text-center text-indigo-600 outline-none" onchange="updateRate(this.value)"> TWD
                </div>
            </div>
            <div class="overflow-x-auto border rounded-2xl bg-white shadow-sm">
                <table class="w-full text-left border-collapse min-w-[900px]">
                    <thead>
                        <tr>
                            <th class="header-cell">日期</th>
                            <th class="header-cell">時間</th>
                            <th class="header-cell">地點項目</th>
                            <th class="header-cell">備註</th>
                            <th class="header-cell text-right">預算(¥)</th>
                            <th class="header-cell text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="itineraryBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyDZZlWitVqgNDU5M65seP-WIAp_hYwyHzM",
            authDomain: "journey-b926c.firebaseapp.com",
            databaseURL: "https://journey-b926c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "journey-b926c",
            storageBucket: "journey-b926c.firebasestorage.app",
            messagingSenderId: "45463991790",
            appId: "1:45463991790:web:67997e40fb20c7eff50aff",
            measurementId: "G-4WG4QXYC6Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const travelRef = ref(db, 'trips/nagoya_trip_data');
        
        let travelData = { 
            itinerary: [], 
            expenses: [], 
            rate: 0.22, 
            members: ["Ruby", "Wen"], 
            payers: ["Ruby", "Wen"] 
        };

        onValue(travelRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                travelData = data;
                if(!travelData.expenses) travelData.expenses = [];
                document.getElementById('syncStatus').innerHTML = "🟢 雲端同步中";
                renderAll();
            } else { push(); }
        });

        function push() { set(travelRef, travelData); }
        window.renderAll = () => { renderConfigLists(); renderTable(); renderExpenses(); };
        window.switchPage = (p) => {
            document.getElementById('itinerary-page').classList.toggle('hidden', p !== 'itinerary');
            document.getElementById('split-page').classList.toggle('hidden', p !== 'split');
            document.getElementById('tab-itinerary').classList.toggle('active-tab', p === 'itinerary');
            document.getElementById('tab-split').classList.toggle('active-tab', p === 'split');
        };

        window.renderConfigLists = () => {
            document.getElementById('payerList').innerHTML = travelData.payers.map(p => `<span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-sm font-bold border border-indigo-100">${p} <button onclick="removePayer('${p}')" class="ml-1 text-red-400">×</button></span>`).join('');
            document.getElementById('targetList').innerHTML = travelData.members.map(m => `<span class="bg-green-50 text-green-700 px-3 py-1 rounded-full text-sm font-bold border border-green-100">${m} <button onclick="removeTarget('${m}')" class="ml-1 text-red-400">×</button></span>`).join('');
            document.getElementById('expPayer').innerHTML = travelData.payers.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('splitCheckboxes').innerHTML = travelData.members.map(m => `<label class="flex items-center gap-2 bg-stone-50 px-3 py-2 rounded-xl cursor-pointer hover:bg-stone-100"><input type="checkbox" value="${m}" checked class="rounded"><span class="font-bold">${m}</span></label>`).join('');
        };

        window.toggleManager = () => document.getElementById('listManager').classList.toggle('hidden');
        window.addNewPayer = () => { const n = prompt("輸入付款人:"); if(n) { travelData.payers.push(n); push(); } };
        window.addNewMember = () => { const n = prompt("輸入成員:"); if(n) { travelData.members.push(n); push(); } };
        window.removePayer = (n) => { if(confirm(`移除付款人 ${n}?`)) { travelData.payers = travelData.payers.filter(x => x !== n); push(); } };
        window.removeTarget = (n) => { if(confirm(`移除成員 ${n}?`)) { travelData.members = travelData.members.filter(x => x !== n); push(); } };
        window.toggleCardField = () => document.getElementById('cardRewardSection').classList.toggle('hidden', document.getElementById('expMethod').value !== 'CARD');

        window.addExpense = () => {
            const date = document.getElementById('expDateInput').value || new Date().toISOString().split('T')[0];
            const name = document.getElementById('expName').value;
            const amt = parseFloat(document.getElementById('expAmount').value);
            if(!name || isNaN(amt)) return alert("請填寫項目與金額");
            
            const currency = document.getElementById('expCurrency').value;
            const isCard = document.getElementById('expMethod').value === 'CARD';
            const cardName = isCard ? document.getElementById('expCardType').value : "";
            const rewardRate = isCard ? parseFloat(document.getElementById('expRewardRate').value) : 0;
            const splitWith = Array.from(document.querySelectorAll('#splitCheckboxes input:checked')).map(i => i.value);

            const newExp = {
                id: Date.now(),
                date, name, amt, currency,
                payer: document.getElementById('expPayer').value,
                splitWith: splitWith,
                isCard, cardName, rewardRate
            };

            travelData.expenses.push(newExp);
            document.getElementById('expName').value = "";
            document.getElementById('expAmount').value = "";
            push();
        };

        // 渲染歷史清單：修改為可編輯模式
        window.renderExpenses = () => {
            const list = document.getElementById('expenseHistory');
            list.innerHTML = (travelData.expenses || []).slice().reverse().map(e => {
                const amtTWD = e.currency === 'TWD' ? e.amt : Math.round(e.amt * travelData.rate);
                const rewardAmt = e.isCard ? Math.round(amtTWD * (e.rewardRate / 100)) : 0;
                
                return `
                <div class="expense-card bg-white p-5 rounded-2xl shadow-sm border border-stone-200">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                        <div class="md:col-span-2 space-y-2">
                            <div class="flex items-center gap-2">
                                <input type="date" value="${e.date}" onchange="editExp(${e.id}, 'date', this.value)" class="text-xs font-bold text-stone-400 bg-transparent outline-none">
                                <span class="text-stone-300">|</span>
                                <input type="text" value="${e.name}" onblur="editExp(${e.id}, 'name', this.value)" class="font-bold text-lg outline-none focus:bg-yellow-50 px-1 rounded flex-1">
                            </div>
                            <div class="flex flex-wrap gap-2 text-xs">
                                <span class="bg-stone-100 px-2 py-1 rounded">付款: 
                                    <select onchange="editExp(${e.id}, 'payer', this.value)" class="bg-transparent font-bold">
                                        ${travelData.payers.map(p => `<option value="${p}" ${p===e.payer?'selected':''}>${p}</option>`).join('')}
                                    </select>
                                </span>
                                <span class="bg-blue-50 text-blue-600 px-2 py-1 rounded">分帳: ${e.splitWith.join(', ')}</span>
                                ${e.isCard ? `<span class="bg-orange-50 text-orange-600 px-2 py-1 rounded">${e.cardName} (${e.rewardRate}%)</span>` : ''}
                            </div>
                        </div>
                        <div class="text-right space-y-1">
                            <div class="flex justify-end items-center gap-1">
                                <span class="text-xs text-stone-400">${e.currency}</span>
                                <input type="number" value="${e.amt}" onblur="editExp(${e.id}, 'amt', this.value)" class="font-mono font-bold text-right w-24 outline-none focus:ring-1 ring-indigo-200">
                            </div>
                            <div class="text-indigo-600 font-black text-xl">$${amtTWD} <span class="text-[10px] text-stone-400">TWD</span></div>
                            ${rewardAmt > 0 ? `<div class="text-green-500 text-xs font-bold">回饋扣除: -$${rewardAmt}</div>` : ''}
                        </div>
                        <div class="flex justify-end gap-2">
                            <button onclick="deleteExpense(${e.id})" class="bg-red-50 text-red-400 p-2 rounded-lg hover:bg-red-500 hover:text-white transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            calculateSettlement();
        };

        window.editExp = (id, field, val) => {
            const idx = travelData.expenses.findIndex(e => e.id === id);
            if(idx > -1) {
                travelData.expenses[idx][field] = (field === 'amt' || field === 'rewardRate') ? parseFloat(val) : val;
                push();
            }
        };

        function calculateSettlement() {
            let total = 0;
            let userPaid = {}; let userShouldPay = {};
            travelData.members.forEach(m => { userShouldPay[m] = 0; userPaid[m] = 0; });

            (travelData.expenses || []).forEach(e => {
                const amtTWD = e.currency === 'TWD' ? e.amt : Math.round(e.amt * travelData.rate);
                const rewardAmt = e.isCard ? Math.round(amtTWD * (e.rewardRate / 100)) : 0;
                const netAmt = amtTWD - rewardAmt;
                
                if(!userPaid[e.payer]) userPaid[e.payer] = 0;
                userPaid[e.payer] += netAmt;

                const share = netAmt / e.splitWith.length;
                e.splitWith.forEach(m => { if(userShouldPay.hasOwnProperty(m)) userShouldPay[m] += share; });
                total += netAmt;
            });

            document.getElementById('ui-total-exp').innerText = `$${Math.round(total)}`;
            document.getElementById('individualStats').innerHTML = travelData.members.map(m => {
                const balance = (userPaid[m] || 0) - (userShouldPay[m] || 0);
                return `
                    <div class="flex justify-between items-center bg-stone-50 p-4 rounded-2xl border border-stone-100">
                        <span class="font-bold text-stone-700">${m}</span>
                        <div class="text-right">
                            <div class="${balance >= 0 ? 'text-green-600' : 'text-red-500'} font-black text-xl">
                                ${balance >= 0 ? '應收' : '應付'} $${Math.abs(Math.round(balance))}
                            </div>
                            <div class="text-[10px] text-stone-400 font-bold">墊 $${Math.round(userPaid[m])} | 負擔 $${Math.round(userShouldPay[m])}</div>
                        </div>
                    </div>`;
            }).join('');
        }

        window.deleteExpense = (id) => { if(confirm("確定要刪除這筆帳單嗎？")) { travelData.expenses = travelData.expenses.filter(e => e.id !== id); push(); } };
        window.clearAllExpenses = () => { if(confirm("🚨 警告：這將永久刪除所有歷史帳單，確定嗎？")) { travelData.expenses = []; push(); } };

        window.renderTable = () => {
            document.getElementById('itineraryBody').innerHTML = (travelData.itinerary || []).map((it, i) => `
                <tr class="border-b hover:bg-stone-50 transition-colors">
                    <td class="p-3"><input type="date" value="${it.date}" class="bg-transparent text-sm" onchange="updateCell(${i}, 'date', this.value)"></td>
                    <td class="p-3"><input type="time" value="${it.time}" class="text-sm outline-none bg-transparent" onchange="updateCell(${i}, 'time', this.value)"></td>
                    <td class="p-3"><div contenteditable class="outline-none focus:bg-yellow-50 px-2 py-1 rounded font-bold" onblur="updateCell(${i}, 'location', this.innerText)">${it.location}</div></td>
                    <td class="p-3"><div contenteditable class="outline-none focus:bg-yellow-50 px-2 py-1 rounded text-stone-500 text-sm" onblur="updateCell(${i}, 'note', this.innerText)">${it.note || ''}</div></td>
                    <td class="p-3 text-right font-mono font-bold text-indigo-600"><input type="number" class="text-right w-24 outline-none bg-transparent" value="${it.amount}" onblur="updateCell(${i}, 'amount', this.value)"></td>
                    <td class="p-3 text-center"><button onclick="deleteRow(${i})" class="text-red-300 hover:text-red-500">✕</button></td>
                </tr>`).join('');
            document.getElementById('rateInput').value = travelData.rate;
        };

        window.addRow = () => { 
            const lastDate = travelData.itinerary.length > 0 ? travelData.itinerary[travelData.itinerary.length - 1].date : "";
            travelData.itinerary.push({ date: lastDate, time: "09:00", location: "新景點", note: "", amount: 0 }); 
            push(); 
        };
        window.updateCell = (i, f, v) => { travelData.itinerary[i][f] = v; push(); };
        window.deleteRow = (i) => { if(confirm("確定要刪除此行程項目嗎？")) { travelData.itinerary.splice(i, 1); push(); } };
        window.updateRate = (v) => { travelData.rate = parseFloat(v); push(); };
    </script>
</body>
</html>
