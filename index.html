<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸名古屋✈️💖 (雙幣獨立編輯版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --jp-indigo: #3E517A; --jp-cream: #FAF7F0; --jp-charcoal: #333333; --jp-accent-red: #B74F41; --jp-bamboo: #7F9A65; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--jp-cream); color: var(--jp-charcoal); }
        .serif-font { font-family: 'Noto Serif TC', serif; }
        .header-cell { background-color: var(--jp-indigo); color: white; padding: 12px; position: sticky; top: 0; z-index: 10; }
        .tab-btn { padding: 16px 24px; font-weight: 600; cursor: pointer; border-bottom: 4px solid transparent; }
        .active-tab { color: var(--jp-indigo); border-bottom: 4px solid var(--jp-indigo); }
        .expense-card { border-left: 6px solid var(--jp-indigo); }
        input:focus { background-color: #fffbeb; }
    </style>
</head>
<body class="p-2 sm:p-4">
    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border border-stone-200">
        <header class="p-6 bg-[var(--jp-indigo)] text-white flex justify-between items-center">
            <h1 class="text-2xl font-bold serif-font tracking-widest">🧸名古屋 ✈️💖</h1>
            <span id="syncStatus" class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold">🔴 連線中...</span>
        </header>

        <div class="flex bg-stone-100 border-b">
            <div onclick="switchPage('itinerary')" id="tab-itinerary" class="tab-btn active-tab">📅 行程</div>
            <div onclick="switchPage('split')" id="tab-split" class="tab-btn">💰 記帳</div>
        </div>

        <div id="split-page" class="p-4 sm:p-6 hidden">
            <div class="grid grid-cols-1 xl:grid-cols-5 gap-6">
                <div class="xl:col-span-2 space-y-6">
                    <div class="bg-stone-50 p-5 rounded-2xl border border-stone-200 shadow-sm">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold text-[var(--jp-indigo)]">💸 新增支出</h2>
                            <button onclick="toggleManager()" class="text-xs bg-stone-200 px-2 py-1 rounded hover:bg-stone-300 font-bold">⚙️ 成員設定</button>
                        </div>
                        
                        <div id="listManager" class="hidden p-4 bg-white border rounded-xl mb-4 shadow-inner text-sm">
                            <p class="font-bold border-b pb-1 mb-2 flex justify-between">付款人 <button onclick="addNewPayer()" class="text-blue-500">+新增</button></p>
                            <div id="payerList" class="flex flex-wrap gap-2 mb-3"></div>
                            <p class="font-bold border-b pb-1 mb-2 flex justify-between">分帳成員 <button onclick="addNewMember()" class="text-blue-500">+新增</button></p>
                            <div id="targetList" class="flex flex-wrap gap-2"></div>
                        </div>

                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <input type="date" id="expDateInput" class="p-2 border rounded-lg outline-none">
                            <input type="text" id="expName" placeholder="項目內容" class="p-2 border rounded-lg outline-none">
                        </div>

                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <select id="expCurrency" class="p-2 border rounded-lg bg-white font-bold">
                                <option value="JPY">日幣 ¥</option>
                                <option value="TWD">台幣 $</option>
                            </select>
                            <input type="number" id="expAmount" placeholder="金額" class="p-2 border rounded-lg col-span-2 outline-none">
                        </div>

                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <select id="expMethod" onchange="toggleCardField()" class="p-2 border rounded-lg bg-white">
                                <option value="CASH">💵 現金</option>
                                <option value="CARD">💳 刷卡</option>
                            </select>
                            <select id="expPayer" class="p-2 border rounded-lg bg-white font-bold"></select>
                        </div>

                        <div id="cardRewardSection" class="hidden grid grid-cols-2 gap-3 mb-3 bg-blue-50 p-3 rounded-xl">
                            <input type="text" id="expCardType" placeholder="哪張卡？" value="玉山熊本熊" class="p-2 border rounded-lg text-sm">
                            <div class="flex items-center bg-white border rounded-lg px-2">
                                <input type="number" id="expRewardRate" value="3" step="0.1" class="w-full p-1 text-right outline-none text-sm">
                                <span class="text-gray-400 text-xs ml-1">%回饋</span>
                            </div>
                        </div>

                        <div class="bg-white p-3 rounded-xl border border-stone-200 mb-4">
                            <p class="font-bold text-stone-500 text-xs mb-2">分帳成員：</p>
                            <div id="splitCheckboxes" class="flex flex-wrap gap-3"></div>
                        </div>

                        <button onclick="addExpense()" class="w-full bg-[var(--jp-bamboo)] hover:bg-green-700 text-white py-3 rounded-xl font-bold shadow-md transition-all active:scale-95">確認加入帳單</button>
                    </div>

                    <div id="settlementReport" class="bg-[var(--jp-indigo)] text-white p-6 rounded-2xl shadow-xl">
                        <p class="text-center text-blue-200 font-bold mb-1 text-sm">🌍 總公費支出 (台幣計)</p>
                        <p class="text-center text-5xl font-black mb-6" id="ui-total-exp">$0</p>
                        <div id="individualStats" class="space-y-3"></div>
                        <button onclick="clearAllExpenses()" class="w-full mt-6 text-white/40 text-xs hover:text-white/80 transition-colors">🗑️ 清空所有歷史帳單</button>
                    </div>
                </div>

                <div class="xl:col-span-3">
                    <h3 class="text-lg font-bold text-stone-600 mb-4 flex justify-between items-center">
                        📑 歷史明細 <span class="text-xs font-normal text-stone-400">直接修改數值會自動儲存</span>
                    </h3>
                    <div id="expenseHistory" class="space-y-4 max-h-[1000px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>

        <div id="itinerary-page" class="p-4 sm:p-6">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                <button onclick="addRow()" class="bg-[var(--jp-indigo)] text-white px-6 py-2 rounded-xl font-bold shadow hover:opacity-90">+ 新增景點</button>
                <div class="text-sm font-bold bg-white px-3 py-1 rounded-lg border">
                    匯率: 1 JPY = <input type="number" id="rateInput" step="0.0001" class="w-16 border-b border-indigo-400 text-center outline-none" onchange="updateRate(this.value)"> TWD
                </div>
            </div>
            <div class="overflow-x-auto border rounded-xl bg-white shadow-sm">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                        <tr>
                            <th class="header-cell">日期</th><th class="header-cell">時間</th>
                            <th class="header-cell">項目</th><th class="header-cell">備註</th>
                            <th class="header-cell text-right">預算(¥)</th><th class="header-cell text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="itineraryBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyDZZlWitVqgNDU5M65seP-WIAp_hYwyHzM",
            authDomain: "journey-b926c.firebaseapp.com",
            databaseURL: "https://journey-b926c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "journey-b926c",
            storageBucket: "journey-b926c.firebasestorage.app",
            messagingSenderId: "45463991790",
            appId: "1:45463991790:web:67997e40fb20c7eff50aff",
            measurementId: "G-4WG4QXYC6Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const travelRef = ref(db, 'trips/nagoya_trip_data');
        
        let travelData = { itinerary: [], expenses: [], rate: 0.22, members: ["Ruby", "Wen"], payers: ["Ruby", "Wen"] };

        onValue(travelRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                travelData = data;
                if(!travelData.expenses) travelData.expenses = [];
                document.getElementById('syncStatus').innerHTML = "🟢 雲端同步中";
                renderAll();
            } else { push(); }
        });

        function push() { set(travelRef, travelData); }
        window.renderAll = () => { renderConfigLists(); renderTable(); renderExpenses(); };
        window.switchPage = (p) => {
            document.getElementById('itinerary-page').classList.toggle('hidden', p !== 'itinerary');
            document.getElementById('split-page').classList.toggle('hidden', p !== 'split');
            document.getElementById('tab-itinerary').classList.toggle('active-tab', p === 'itinerary');
            document.getElementById('tab-split').classList.toggle('active-tab', p === 'split');
        };

        window.renderConfigLists = () => {
            const wrap = (txt, fn) => `<span class="bg-indigo-50 text-indigo-700 px-2 py-1 rounded text-xs font-bold border border-indigo-100">${txt} <button onclick="${fn}" class="ml-1 text-red-400">×</button></span>`;
            document.getElementById('payerList').innerHTML = travelData.payers.map(p => wrap(p, `removePayer('${p}')`)).join('');
            document.getElementById('targetList').innerHTML = travelData.members.map(m => wrap(m, `removeTarget('${m}')`)).join('');
            document.getElementById('expPayer').innerHTML = travelData.payers.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('splitCheckboxes').innerHTML = travelData.members.map(m => `<label class="flex items-center gap-1 text-sm bg-stone-100 px-2 py-1 rounded cursor-pointer"><input type="checkbox" value="${m}" checked class="rounded"><span class="font-bold">${m}</span></label>`).join('');
        };

        window.toggleManager = () => document.getElementById('listManager').classList.toggle('hidden');
        window.addNewPayer = () => { const n = prompt("輸入付款人:"); if(n) { travelData.payers.push(n); push(); } };
        window.addNewMember = () => { const n = prompt("輸入成員:"); if(n) { travelData.members.push(n); push(); } };
        window.removePayer = (n) => { if(confirm(`移除付款人 ${n}?`)) { travelData.payers = travelData.payers.filter(x => x !== n); push(); } };
        window.removeTarget = (n) => { if(confirm(`移除成員 ${n}?`)) { travelData.members = travelData.members.filter(x => x !== n); push(); } };
        window.toggleCardField = () => document.getElementById('cardRewardSection').classList.toggle('hidden', document.getElementById('expMethod').value !== 'CARD');

        window.addExpense = () => {
            const date = document.getElementById('expDateInput').value || new Date().toISOString().split('T')[0];
            const name = document.getElementById('expName').value;
            const amt = parseFloat(document.getElementById('expAmount').value);
            if(!name || isNaN(amt)) return alert("請填寫項目與金額");
            
            const currency = document.getElementById('expCurrency').value;
            const amtJPY = currency === 'JPY' ? amt : Math.round(amt / travelData.rate);
            const amtTWD = currency === 'TWD' ? amt : Math.round(amt * travelData.rate);
            const isCard = document.getElementById('expMethod').value === 'CARD';
            const splitWith = Array.from(document.querySelectorAll('#splitCheckboxes input:checked')).map(i => i.value);

            const newExp = {
                id: Date.now(),
                date, name, 
                amtJPY, amtTWD, // 儲存兩者，方便後續修改
                payer: document.getElementById('expPayer').value,
                splitWith: splitWith,
                isCard, 
                cardName: isCard ? document.getElementById('expCardType').value : "",
                rewardRate: isCard ? parseFloat(document.getElementById('expRewardRate').value) : 0
            };

            travelData.expenses.push(newExp);
            document.getElementById('expName').value = "";
            document.getElementById('expAmount').value = "";
            push();
        };

        window.renderExpenses = () => {
            const list = document.getElementById('expenseHistory');
            list.innerHTML = (travelData.expenses || []).slice().reverse().map(e => {
                const rewardAmt = e.isCard ? Math.round(e.amtTWD * (e.rewardRate / 100)) : 0;
                return `
                <div class="expense-card bg-white p-4 rounded-lg shadow-sm border border-stone-200 text-sm">
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                        <div class="md:col-span-4 border-b md:border-b-0 md:border-r border-stone-100 pb-2 md:pb-0">
                            <input type="date" value="${e.date}" onchange="editExp(${e.id}, 'date', this.value)" class="text-xs text-stone-400 font-bold block bg-transparent outline-none">
                            <input type="text" value="${e.name}" onblur="editExp(${e.id}, 'name', this.value)" class="font-bold text-base outline-none w-full mt-1">
                            <div class="mt-2 flex flex-wrap gap-1">
                                <span class="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded text-[10px]">付: ${e.payer}</span>
                                <span class="bg-green-100 text-green-700 px-1.5 py-0.5 rounded text-[10px]">分: ${e.splitWith.join(',')}</span>
                                ${e.isCard ? `<span class="bg-orange-100 text-orange-700 px-1.5 py-0.5 rounded text-[10px]">${e.cardName}</span>` : ''}
                            </div>
                        </div>
                        
                        <div class="md:col-span-6 grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] text-stone-400 block mb-1">日幣 JPY</label>
                                <div class="flex items-center">
                                    <span class="text-stone-400 mr-1">¥</span>
                                    <input type="number" value="${e.amtJPY}" onblur="editExp(${e.id}, 'amtJPY', this.value)" class="font-mono font-bold w-full bg-stone-50 p-1 rounded">
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] text-stone-400 block mb-1">台幣 TWD (含卡費)</label>
                                <div class="flex items-center">
                                    <span class="text-indigo-400 mr-1">$</span>
                                    <input type="number" value="${e.amtTWD}" onblur="editExp(${e.id}, 'amtTWD', this.value)" class="font-mono font-bold w-full bg-blue-50 p-1 rounded text-indigo-700">
                                </div>
                            </div>
                            <div class="col-span-2 flex justify-between items-center text-[10px] text-stone-400">
                                <span>回饋趴數: <input type="number" value="${e.rewardRate}" step="0.1" onblur="editExp(${e.id}, 'rewardRate', this.value)" class="w-8 bg-transparent border-b"> %</span>
                                ${rewardAmt > 0 ? `<span class="text-green-600 font-bold">回饋折抵 -$${rewardAmt}</span>` : ''}
                            </div>
                        </div>

                        <div class="md:col-span-2 flex items-center justify-end">
                            <button onclick="deleteExpense(${e.id})" class="text-red-300 hover:text-red-500 p-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            calculateSettlement();
        };

        window.editExp = (id, field, val) => {
            const idx = travelData.expenses.findIndex(e => e.id === id);
            if(idx > -1) {
                let finalVal = (field.includes('amt') || field === 'rewardRate') ? parseFloat(val) : val;
                travelData.expenses[idx][field] = finalVal;
                push();
            }
        };

        function calculateSettlement() {
            let total = 0;
            let userPaid = {}; let userShouldPay = {};
            travelData.members.forEach(m => { userShouldPay[m] = 0; userPaid[m] = 0; });

            (travelData.expenses || []).forEach(e => {
                const rewardAmt = e.isCard ? Math.round(e.amtTWD * (e.rewardRate / 100)) : 0;
                const netAmt = e.amtTWD - rewardAmt;
                
                if(!userPaid[e.payer]) userPaid[e.payer] = 0;
                userPaid[e.payer] += netAmt;

                const share = netAmt / e.splitWith.length;
                e.splitWith.forEach(m => { if(userShouldPay.hasOwnProperty(m)) userShouldPay[m] += share; });
                total += netAmt;
            });

            document.getElementById('ui-total-exp').innerText = `$${Math.round(total)}`;
            document.getElementById('individualStats').innerHTML = travelData.members.map(m => {
                const balance = (userPaid[m] || 0) - (userShouldPay[m] || 0);
                return `
                    <div class="flex justify-between items-center text-sm border-b border-white/10 pb-2">
                        <span>${m}</span>
                        <span class="font-bold ${balance >= 0 ? 'text-green-300' : 'text-red-300'}">${balance >= 0 ? '收' : '付'} $${Math.abs(Math.round(balance))}</span>
                    </div>`;
            }).join('');
        }

        window.deleteExpense = (id) => { if(confirm("確定刪除這筆帳單？")) { travelData.expenses = travelData.expenses.filter(e => e.id !== id); push(); } };
        window.clearAllExpenses = () => { if(confirm("確定要清空嗎？")) { travelData.expenses = []; push(); } };
        window.updateRate = (v) => { travelData.rate = parseFloat(v); push(); };
        window.renderTable = () => {
            document.getElementById('itineraryBody').innerHTML = (travelData.itinerary || []).map((it, i) => `
                <tr class="border-b text-sm">
                    <td class="p-2"><input type="date" value="${it.date}" class="bg-transparent" onchange="updateCell(${i}, 'date', this.value)"></td>
                    <td class="p-2"><input type="time" value="${it.time}" class="bg-transparent w-full" onchange="updateCell(${i}, 'time', this.value)"></td>
                    <td class="p-2"><input type="text" value="${it.location}" class="font-bold w-full" onblur="updateCell(${i}, 'location', this.value)"></td>
                    <td class="p-2"><input type="text" value="${it.note||''}" class="text-stone-400 w-full" onblur="updateCell(${i}, 'note', this.value)"></td>
                    <td class="p-2 text-right font-mono font-bold text-indigo-600"><input type="number" class="text-right w-16 bg-transparent" value="${it.amount}" onblur="updateCell(${i}, 'amount', this.value)"></td>
                    <td class="p-2 text-center"><button onclick="deleteRow(${i})" class="text-red-300">✕</button></td>
                </tr>`).join('');
            document.getElementById('rateInput').value = travelData.rate;
        };
        window.addRow = () => { travelData.itinerary.push({ date: "", time: "09:00", location: "新景點", note: "", amount: 0 }); push(); };
        window.updateCell = (i, f, v) => { travelData.itinerary[i][f] = v; push(); };
        window.deleteRow = (i) => { if(confirm("確定刪除行程？")) { travelData.itinerary.splice(i, 1); push(); } };
    </script>
</body>
</html>
