<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸名古屋✈️💖 (日期篩選優化版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FAF7F0; color: #333; font-size: 14px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: bold; font-size: 14px; }
        .active-tab { color: #3E517A; border-bottom: 3px solid #3E517A; }
        .stat-card { background: #fff; border-radius: 12px; padding: 14px; border: 1px solid #e5e7eb; font-size: 14px; }
        input, select, textarea { font-size: 14px !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
    </style>
</head>
<body class="p-2 sm:p-4 text-sm">
    <div class="max-w-7xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-stone-200">
        <header class="p-4 bg-[#3E517A] text-white flex justify-between items-center">
            <h1 class="text-lg font-bold tracking-widest">🧸名古屋 ✈️💖 財務中心</h1>
            <div class="flex items-center gap-2">
                <button onclick="shareToLine()" class="bg-[#06C755] hover:bg-[#05a547] text-white px-3 py-1 rounded-full text-[12px] font-bold shadow-sm flex items-center gap-1">📢 分享 LINE</button>
                <span id="syncStatus" class="bg-white/20 px-3 py-1 rounded-full text-[11px]">🔴 同步中</span>
            </div>
        </header>

        <div class="flex bg-stone-100 border-b">
            <div onclick="switchPage('itinerary')" id="tab-itinerary" class="tab-btn">📅 行程規劃</div>
            <div onclick="switchPage('split')" id="tab-split" class="tab-btn active-tab">💰 記帳分帳</div>
        </div>

        <div id="split-page" class="p-4">
            <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
                <div class="xl:col-span-4 space-y-6">
                    <div class="bg-stone-50 p-4 rounded-xl border border-stone-200 shadow-sm">
                        <div class="flex justify-between items-center mb-3">
                            <h2 class="font-bold text-[#3E517A]">💸 新增支出</h2>
                            <button onclick="toggleManager()" class="text-[12px] bg-stone-200 px-2 py-1 rounded">⚙️ 成員設定</button>
                        </div>
                        
                        <div id="listManager" class="hidden p-3 bg-white border rounded-lg mb-4 text-[13px]">
                            <p class="font-bold border-b pb-1 mb-2 flex justify-between">付款人 <button onclick="addNewPayer()" class="text-blue-500">+增</button></p>
                            <div id="payerList" class="flex flex-wrap gap-1 mb-2"></div>
                            <p class="font-bold border-b pb-1 mb-2 flex justify-between">成員 <button onclick="addNewMember()" class="text-blue-500">+增</button></p>
                            <div id="targetList" class="flex flex-wrap gap-1"></div>
                        </div>

                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <input type="date" id="expDateInput" class="p-2 border rounded-lg w-full">
                            <input type="text" id="expName" placeholder="項目" class="p-2 border rounded-lg w-full">
                        </div>

                        <div class="grid grid-cols-3 gap-2 mb-2">
                            <select id="expCurrency" class="p-2 border rounded-lg bg-white font-bold">
                                <option value="JPY">日幣 ¥</option>
                                <option value="TWD">台幣 $</option>
                            </select>
                            <input type="number" id="expAmount" placeholder="金額" class="p-2 border rounded-lg col-span-2">
                        </div>

                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <select id="expPayer" class="p-2 border rounded-lg bg-white"></select>
                            <select id="expMethod" onchange="toggleCardField()" class="p-2 border rounded-lg bg-white">
                                <option value="CASH">💵 現金</option>
                                <option value="CARD">💳 刷卡</option>
                            </select>
                        </div>

                        <div id="cardRewardSection" class="hidden grid grid-cols-2 gap-2 mb-2 bg-blue-50 p-2 rounded-lg">
                            <input type="text" id="expCardType" placeholder="卡名" value="玉山熊本熊" class="p-2 border rounded text-[13px]">
                            <div class="flex items-center bg-white border rounded px-2">
                                <input type="number" id="expRewardRate" value="3" step="0.1" class="w-full text-right text-[13px] outline-none">
                                <span class="text-gray-400 text-[12px] ml-1">%</span>
                            </div>
                        </div>

                        <div class="bg-white p-2 rounded-lg border mb-4">
                            <p class="text-[12px] text-stone-400 font-bold mb-1">分帳成員：</p>
                            <div id="splitCheckboxes" class="flex flex-wrap gap-2"></div>
                        </div>

                        <button onclick="addExpense()" class="w-full bg-[#7F9A65] hover:bg-green-700 text-white py-2 rounded-lg font-bold transition-all shadow-sm">確認加入帳單</button>
                    </div>

                    <div id="individualStats" class="space-y-4">
                        <h3 class="font-bold text-stone-600 px-1">📊 個人結算統計</h3>
                    </div>
                </div>

                <div class="xl:col-span-8">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3 bg-white p-3 rounded-xl border border-stone-100">
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-stone-600 whitespace-nowrap">📑 歷史明細</h3>
                            <select id="dateFilter" onchange="renderExpenses()" class="p-1 border rounded-lg bg-stone-50 text-[13px] outline-none border-stone-300 font-bold text-indigo-700">
                                <option value="ALL">📅 全部日期</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-4 text-[12px]">
                            <span id="filterSubtotal" class="font-bold text-stone-500"></span>
                            <button onclick="clearAllExpenses()" class="text-red-400 hover:text-red-600 transition-colors">🗑️ 清空歷史</button>
                        </div>
                    </div>
                    <div id="expenseHistory" class="space-y-3 max-h-[900px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>

        <div id="itinerary-page" class="p-4 hidden">
            <div class="flex justify-between items-center mb-4 text-sm">
                <button onclick="addRow()" class="bg-[#3E517A] text-white px-4 py-2 rounded-lg font-bold">+ 新增行程</button>
                <div class="font-bold">匯率: 1 JPY = <input type="number" id="rateInput" step="0.0001" class="w-16 border-b text-center outline-none" onchange="updateRate(this.value)"> TWD</div>
            </div>
            <div class="overflow-x-auto border rounded-xl">
                <table class="w-full text-left">
                    <thead class="bg-stone-100 font-bold">
                        <tr><th class="p-3">日期</th><th class="p-3">時間</th><th class="p-3">項目</th><th class="p-3">備註</th><th class="p-3 text-right">預算(¥)</th><th class="p-3"></th></tr>
                    </thead>
                    <tbody id="itineraryBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyDZZlWitVqgNDU5M65seP-WIAp_hYwyHzM",
            authDomain: "journey-b926c.firebaseapp.com",
            databaseURL: "https://journey-b926c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "journey-b926c",
            storageBucket: "journey-b926c.firebasestorage.app",
            messagingSenderId: "45463991790",
            appId: "1:45463991790:web:67997e40fb20c7eff50aff",
            measurementId: "G-4WG4QXYC6Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const travelRef = ref(db, 'trips/nagoya_trip_data');
        
        let travelData = { itinerary: [], expenses: [], rate: 0.22, members: ["Ruby", "Wen"], payers: ["Ruby", "Wen"] };
        let finalStats = {};

        onValue(travelRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                travelData = data;
                if(!travelData.expenses) travelData.expenses = [];
                updateDateFilter(); // 更新下拉選單
                document.getElementById('syncStatus').innerHTML = "🟢 雲端同步中";
                renderAll();
            } else { push(); }
        });

        function push() { set(travelRef, travelData); }
        window.renderAll = () => { renderConfigLists(); renderTable(); renderExpenses(); };
        window.switchPage = (p) => {
            document.getElementById('itinerary-page').classList.toggle('hidden', p !== 'itinerary');
            document.getElementById('split-page').classList.toggle('hidden', p !== 'split');
            document.getElementById('tab-itinerary').classList.toggle('active-tab', p === 'itinerary');
            document.getElementById('tab-split').classList.toggle('active-tab', p === 'split');
        };

        window.updateDateFilter = () => {
            const filterSelect = document.getElementById('dateFilter');
            const currentVal = filterSelect.value;
            const dates = [...new Set(travelData.expenses.map(e => e.date))].sort();
            
            let options = '<option value="ALL">📅 全部日期</option>';
            dates.forEach(d => {
                options += `<option value="${d}" ${d === currentVal ? 'selected' : ''}>${d}</option>`;
            });
            filterSelect.innerHTML = options;
        };

        window.renderConfigLists = () => {
            const wrap = (txt, fn) => `<span class="bg-stone-100 px-2 py-0.5 rounded text-[11px] font-bold border">${txt} <button onclick="${fn}" class="ml-1 text-red-400">×</button></span>`;
            document.getElementById('payerList').innerHTML = travelData.payers.map(p => wrap(p, `removePayer('${p}')`)).join('');
            document.getElementById('targetList').innerHTML = travelData.members.map(m => wrap(m, `removeTarget('${m}')`)).join('');
            document.getElementById('expPayer').innerHTML = travelData.payers.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('splitCheckboxes').innerHTML = travelData.members.map(m => `
                <label class="cursor-pointer"><input type="checkbox" value="${m}" checked class="hidden peer">
                <span class="px-2 py-1 border rounded-full text-[12px] font-bold peer-checked:bg-[#3E517A] peer-checked:text-white">${m}</span></label>`).join('');
        };

        window.toggleManager = () => document.getElementById('listManager').classList.toggle('hidden');
        window.addNewPayer = () => { const n = prompt("輸入付款人:"); if(n) { travelData.payers.push(n); push(); } };
        window.addNewMember = () => { const n = prompt("輸入成員:"); if(n) { travelData.members.push(n); push(); } };
        window.removePayer = (n) => { if(confirm(`移除 ${n}?`)) { travelData.payers = travelData.payers.filter(x => x !== n); push(); } };
        window.removeTarget = (n) => { if(confirm(`移除成員 ${n}?`)) { travelData.members = travelData.members.filter(x => x !== n); push(); } };
        window.toggleCardField = () => document.getElementById('cardRewardSection').classList.toggle('hidden', document.getElementById('expMethod').value !== 'CARD');

        window.addExpense = () => {
            const name = document.getElementById('expName').value;
            const amt = parseFloat(document.getElementById('expAmount').value);
            if(!name || isNaN(amt)) return alert("請填寫項目與金額");
            const currency = document.getElementById('expCurrency').value;
            const isCard = document.getElementById('expMethod').value === 'CARD';
            const splitWith = Array.from(document.querySelectorAll('#splitCheckboxes input:checked')).map(i => i.value);

            const newExp = {
                id: Date.now(),
                date: document.getElementById('expDateInput').value || new Date().toISOString().split('T')[0],
                name,
                amtJPY: currency === 'JPY' ? amt : Math.round(amt / travelData.rate),
                amtTWD: currency === 'TWD' ? amt : Math.round(amt * travelData.rate),
                payer: document.getElementById('expPayer').value,
                splitWith: splitWith,
                isCard, cardName: isCard ? document.getElementById('expCardType').value : "",
                rewardRate: isCard ? parseFloat(document.getElementById('expRewardRate').value) : 0
            };
            travelData.expenses.push(newExp);
            document.getElementById('expName').value = ""; document.getElementById('expAmount').value = "";
            push();
        };

        window.renderExpenses = () => {
            const list = document.getElementById('expenseHistory');
            const selectedDate = document.getElementById('dateFilter').value;
            
            // 篩選與計算當前小計
            let filtered = (travelData.expenses || []).slice().reverse();
            if(selectedDate !== 'ALL') {
                filtered = filtered.filter(e => e.date === selectedDate);
            }

            let subJPY = 0, subTWD = 0;
            filtered.forEach(e => { subJPY += e.amtJPY; subTWD += e.amtTWD; });
            document.getElementById('filterSubtotal').innerText = `小計: ¥${subJPY} / $${subTWD}`;

            list.innerHTML = filtered.map(e => {
                const rewardAmt = e.isCard ? Math.round(e.amtTWD * (e.rewardRate / 100)) : 0;
                return `
                <div class="bg-white p-3 rounded-lg border border-stone-200 shadow-sm">
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-center">
                        <div class="md:col-span-3">
                            <input type="date" value="${e.date}" onchange="editExp(${e.id}, 'date', this.value)" class="text-[11px] text-stone-400 font-bold bg-transparent outline-none block">
                            <input type="text" value="${e.name}" onblur="editExp(${e.id}, 'name', this.value)" class="font-bold outline-none w-full focus:bg-yellow-50 rounded px-1">
                            <div class="mt-1"><select onchange="editExp(${e.id}, 'payer', this.value)" class="bg-indigo-50 text-indigo-700 text-[11px] px-1 rounded font-bold">
                                ${travelData.payers.map(p => `<option value="${p}" ${p===e.payer?'selected':''}>付:${p}</option>`).join('')}
                            </select></div>
                        </div>
                        <div class="md:col-span-3 border-l pl-3">
                            <p class="text-[11px] text-stone-400 font-bold mb-1">分帳成員：</p>
                            <div class="flex flex-wrap gap-1">${travelData.members.map(m => `
                                <button onclick="toggleExpMember(${e.id}, '${m}')" class="text-[11px] px-1.5 py-0.5 rounded border ${e.splitWith.includes(m)?'bg-green-500 text-white border-green-600':'bg-stone-50 text-stone-400 border-stone-200'}">${m}</button>
                            `).join('')}</div>
                        </div>
                        <div class="md:col-span-5 grid grid-cols-2 gap-2 border-l pl-3">
                            <div><label class="text-[11px] text-stone-400">¥ 日幣</label><input type="number" value="${e.amtJPY}" onblur="editExp(${e.id}, 'amtJPY', this.value)" class="font-mono font-bold w-full bg-stone-50 p-1 rounded"></div>
                            <div><label class="text-[11px] text-stone-400">$ 台幣</label><input type="number" value="${e.amtTWD}" onblur="editExp(${e.id}, 'amtTWD', this.value)" class="font-mono font-bold w-full bg-blue-50 p-1 rounded text-indigo-700"></div>
                            <div class="col-span-2 flex justify-between items-center text-[11px]">
                                <div><input type="text" value="${e.cardName||''}" onblur="editExp(${e.id}, 'cardName', this.value)" placeholder="無卡" class="border-b outline-none w-16"><input type="number" value="${e.rewardRate}" step="0.1" onblur="editExp(${e.id}, 'rewardRate', this.value)" class="border-b outline-none w-8 text-center">%</div>
                                <span class="text-green-600 font-bold">${rewardAmt > 0 ? '-$'+rewardAmt : ''}</span>
                            </div>
                        </div>
                        <div class="md:col-span-1 text-right"><button onclick="deleteExpense(${e.id})" class="text-red-300 hover:text-red-500">✕</button></div>
                    </div>
                </div>`;
            }).join('');
            calculateSettlement();
        };

        window.editExp = (id, field, val) => {
            const idx = travelData.expenses.findIndex(e => e.id === id);
            if(idx > -1) {
                travelData.expenses[idx][field] = (['amtJPY', 'amtTWD', 'rewardRate'].includes(field)) ? parseFloat(val) : val;
                push();
            }
        };

        window.toggleExpMember = (id, name) => {
            const idx = travelData.expenses.findIndex(e => e.id === id);
            if(idx > -1) {
                let list = travelData.expenses[idx].splitWith;
                if(list.includes(name)) list = list.filter(x => x !== name);
                else list.push(name);
                travelData.expenses[idx].splitWith = list;
                push();
            }
        };

        function calculateSettlement() {
            let stats = {};
            travelData.members.forEach(m => { stats[m] = {代墊: 0, 應負團費: 0, 代購: 0, 總支出: 0}; });
            (travelData.expenses || []).forEach(e => {
                const rewardAmt = e.isCard ? Math.round(e.amtTWD * (e.rewardRate / 100)) : 0;
                const netAmt = e.amtTWD - rewardAmt;
                if(stats[e.payer]) stats[e.payer].代墊 += netAmt;
                const share = netAmt / e.splitWith.length;
                e.splitWith.forEach(m => {
                    if(stats[m]) {
                        if(e.splitWith.length === 1) stats[m].代購 += share;
                        else stats[m].應負團費 += share;
                        stats[m].總支出 += share;
                    }
                });
            });
            finalStats = stats;
            document.getElementById('individualStats').innerHTML = travelData.members.map(m => {
                const s = stats[m];
                const balance = s.代墊 - s.總支出;
                return `
                <div class="stat-card space-y-2">
                    <div class="flex justify-between items-center border-b pb-1 mb-2">
                        <span class="font-black text-stone-700">${m}</span>
                        <span class="font-black ${balance >= 0 ? 'text-green-600' : 'text-red-500'}">
                            ${balance >= 0 ? '應收' : '應付'} $${Math.abs(Math.round(balance))}
                        </span>
                    </div>
                    <div class="grid grid-cols-2 gap-y-1 text-[13px] font-bold">
                        <div class="text-stone-400 text-[12px]">個人總花費:</div><div class="text-right">$${Math.round(s.總支出)}</div>
                        <div class="text-stone-400 text-[12px]">└ 應負團費:</div><div class="text-right text-stone-500">$${Math.round(s.應負團費)}</div>
                        <div class="text-stone-400 text-[12px]">└ 代購支出:</div><div class="text-right text-stone-500">$${Math.round(s.代購)}</div>
                        <div class="text-[#3E517A] border-t pt-1">代墊(扣回饋):</div><div class="text-right text-[#3E517A] border-t pt-1">$${Math.round(s.代墊)}</div>
                    </div>
                </div>`;
            }).join('');
        }

        window.shareToLine = () => {
            let msg = `🧸 名古屋旅費結算報表 ✈️💖\n`;
            msg += `🌍 匯率參考: 1 JPY = ${travelData.rate} TWD\n\n`;
            msg += `📑 【歷史明細摘要】\n`;
            let totalTWD = 0;
            (travelData.expenses || []).forEach(e => {
                const rewardAmt = e.isCard ? Math.round(e.amtTWD * (e.rewardRate / 100)) : 0;
                msg += `• ${e.date.slice(5)} ${e.name}: ¥${e.amtJPY} ($${e.amtTWD}) - ${e.payer}付\n`;
                totalTWD += (e.amtTWD - rewardAmt);
            });
            msg += `💰 總墊付支出: $${Math.round(totalTWD)}\n\n`;
            msg += `👤 【個人結算清單】\n`;
            travelData.members.forEach(m => {
                const s = finalStats[m]; const bal = s.代墊 - s.總支出;
                msg += `[ ${m} ]\n ${bal >= 0 ? '💰 應收' : '💸 應付'}: $${Math.abs(Math.round(bal))}\n 個人總花費: $${Math.round(s.總支出)}\n 代墊: $${Math.round(s.代墊)}\n`;
                msg += `--------------------------\n`;
            });
            navigator.clipboard.writeText(msg).then(() => { alert("✅ 報表已複製！"); window.location.href = "line://msg/text/" + encodeURIComponent(msg); });
        };

        window.deleteExpense = (id) => { if(confirm("確定刪除？")) { travelData.expenses = travelData.expenses.filter(e => e.id !== id); push(); } };
        window.clearAllExpenses = () => { if(confirm("確定清空？")) { travelData.expenses = []; push(); } };
        window.updateRate = (v) => { travelData.rate = parseFloat(v); push(); };
        window.renderTable = () => {
            document.getElementById('itineraryBody').innerHTML = (travelData.itinerary || []).map((it, i) => `
                <tr class="border-b text-[14px]">
                    <td class="p-2"><input type="date" value="${it.date}" onchange="updateCell(${i}, 'date', this.value)" class="bg-transparent w-full"></td>
                    <td class="p-2"><input type="time" value="${it.time}" onchange="updateCell(${i}, 'time', this.value)" class="bg-transparent w-full"></td>
                    <td class="p-2"><input type="text" value="${it.location}" onblur="updateCell(${i}, 'location', this.value)" class="font-bold w-full"></td>
                    <td class="p-2"><input type="text" value="${it.note||''}" onblur="updateCell(${i}, 'note', this.value)" class="text-stone-400 text-[13px] w-full"></td>
                    <td class="p-2 text-right"><input type="number" value="${it.amount}" onblur="updateCell(${i}, 'amount', this.value)" class="text-right font-mono text-indigo-600 w-16"></td>
                    <td class="p-2 text-center"><button onclick="deleteRow(${i})" class="text-red-300">✕</button></td>
                </tr>`).join('');
            document.getElementById('rateInput').value = travelData.rate;
        };
        window.addRow = () => { travelData.itinerary.push({ date: "", time: "09:00", location: "新景點", note: "", amount: 0 }); push(); };
        window.updateCell = (i, f, v) => { travelData.itinerary[i][f] = v; push(); };
        window.deleteRow = (i) => { if(confirm("確定刪除行程？")) { travelData.itinerary.splice(i, 1); push(); } };
    </script>
</body>
</html>
